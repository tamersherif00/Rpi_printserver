[Service]
# Protect sshd from the kernel OOM killer.
#
# Symptom this fixes: on a 1 GB Pi 3B running CUPS+Avahi+Samba+wsdd+gunicorn,
# memory pressure builds up over days. When the kernel OOM-kills, the
# default scoring sometimes picks sshd, leaving the operator with only
# ICMP — they can ping the Pi but can't SSH in to diagnose, and have to
# walk to the Pi and reboot.
#
# OOMScoreAdjust=-900 makes sshd one of the LAST processes the kernel
# will kill (range -1000..1000, lower = safer). Combined with
# OOMScoreAdjust=200 on printserver-web, the kernel kills the web
# service first (which auto-restarts) and leaves SSH alive.
OOMScoreAdjust=-900
