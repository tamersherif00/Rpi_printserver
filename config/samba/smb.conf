#
# Samba Configuration for Raspberry Pi Print Server
# Shares CUPS printers to Windows clients via SMB
#

[global]
   workgroup = WORKGROUP
   server string = Raspberry Pi Print Server
   security = user
   map to guest = Bad User
   guest account = nobody

   # Allow unauthenticated share enumeration so Windows Explorer can list
   # shares at \\<ip>. Windows 10/11 (since v1709) blocks guest *logins* by
   # default but still allows share browsing with restrict anonymous = 0.
   #
   # For full guest access (so users are NOT prompted for a password) run
   # this once on each Windows PC, then reboot:
   #   gpedit.msc → Computer Config → Administrative Templates → Network →
   #   Lanman Workstation → "Enable insecure guest logons" → Enabled
   #
   # Alternatively, add the printer directly via IPP (no SMB needed):
   #   Windows Settings → Bluetooth & devices → Printers → Add a printer →
   #   "The printer I want isn't listed" → "Select a shared printer by name"
   #   → http://<pi-ip>:631/printers/<PrinterName>
   restrict anonymous = 0

   # CUPS as the printing backend
   printing = cups
   printcap name = cups
   load printers = yes

   # SMB2+ only (SMB1/NT1 disabled for security)
   server min protocol = SMB2

   log level = 1
   log file = /var/log/samba/log.%m
   max log size = 1000

[printers]
   comment = All Printers
   browseable = yes
   path = /var/spool/samba
   printable = yes
   guest ok = yes
   public = yes
   read only = yes
   create mask = 0700

[print$]
   comment = Printer Drivers
   path = /var/lib/samba/printers
   browseable = yes
   read only = yes
   guest ok = yes
   public = yes
