#
# Samba Configuration for Raspberry Pi Print Server
# Shares CUPS printers to Windows clients via SMB
#

[global]
   workgroup = WORKGROUP
   server string = Raspberry Pi Print Server
   security = user
   map to guest = Bad User
   guest account = nobody

   # CUPS as the printing backend
   printing = cups
   printcap name = cups
   load printers = yes

   # SMB2+ only (SMB1/NT1 disabled for security)
   server min protocol = SMB2

   log level = 1
   log file = /var/log/samba/log.%m
   max log size = 1000

[printers]
   comment = All Printers
   browseable = yes
   path = /var/spool/samba
   printable = yes
   guest ok = yes
   read only = yes
   create mask = 0700

[print$]
   comment = Printer Drivers
   path = /var/lib/samba/printers
   browseable = yes
   read only = yes
   guest ok = yes
